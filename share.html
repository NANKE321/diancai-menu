<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家常点菜 - 分享</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;background:linear-gradient(135deg,#FF6B35,#FF8C42);color:#fff}
.box{background:#fff;border-radius:24px;padding:40px;text-align:center;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
h1{color:#FF6B35;font-size:24px;margin:0 0 8px}
p{color:#888;font-size:14px;margin:0 0 20px}
.qr{margin:20px 0}
.qr img{width:200px;height:200px;border-radius:12px}
.link{display:block;margin:16px 0;padding:12px 20px;background:#f5f5f5;border-radius:12px;color:#FF6B35;font-weight:600;text-decoration:none;font-size:14px;word-break:break-all}
.link:hover{background:#fff5f0}
.btn{display:inline-block;margin-top:16px;padding:12px 32px;background:linear-gradient(135deg,#FF6B35,#FF8C42);color:#fff;border-radius:24px;font-size:16px;font-weight:700;text-decoration:none;box-shadow:0 4px 16px rgba(255,107,53,.3)}
.note{font-size:12px;color:#bbb;margin-top:16px}
</style>
</head>
<body>
<div class="box">
  <h1>🍽️ 家常点菜</h1>
  <p>扫码或点击链接打开点菜网站</p>
  <div class="qr">
    <img src="qr-code.png" alt="QR Code">
  </div>
  <a class="btn" href="/" target="_blank">打开点菜网站 →</a>
  <div class="note">启动服务后访问 http://localhost:3000</div>
</div>
</body>
</html>
